            margin: 0;
            padding: 0;
        }

            margin: 0 auto;
            padding: 20px;

            padding: 20px 0;

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);

            background: var(--card-bg);
            padding: 4px;
            border-radius: 30px;
            border: 1px solid var(--border);

            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-muted);
            border: none;
            background: transparent;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
        }

        .city-select-wrapper {
            position: relative;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .dropdown.show {
            display: block;
        }

        .dropdown-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .dropdown-item:hover {
            background: var(--input-bg);
            color: var(--primary);
        }

        .result-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-better { background: rgba(34, 197, 94, 0.2); color: var(--better); }
        .badge-worse { background: rgba(239, 68, 68, 0.2); color: var(--worse); }
        .badge-similar { background: rgba(148, 163, 184, 0.2); color: var(--similar); }

        .big-number {
            font-size: 48px;
            font-weight: 700;
            margin: 10px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin: 20px 0;

            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;

        .stat-item span:last-child {
            font-size: 20px;
            font-weight: 600;
        }

            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;

        .delta-label { font-size: 14px; color: var(--text-muted); }
        .delta-value { font-weight: 600; }
        .delta-value.positive { color: var(--better); }
        .delta-value.negative { color: var(--worse); }

        .progress-bar {
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;

        .progress-fill {
            height: 100%;

            border-radius: 8px;

        { id: 'albany', name: 'Albany', state: 'NY', colIndex: 98, stateTaxRate: 5.85, medianRent1BR: 1300, avgCommute: 40, market: 'open' },
        { id: 'savannah', name: 'Savannah', state: 'GA', colIndex: 94, stateTaxRate: 5.49, medianRent1BR: 1500, avgCommute: 40, market: 'open' },
        { id: 'charleston', name: 'Charleston', state: 'SC', colIndex: 105, stateTaxRate: 6.4, medianRent1BR: 1800, avgCommute: 45, market: 'open' },
        { id: 'reno', name: 'Reno', state: 'NV', colIndex: 108, stateTaxRate: 0, medianRent1BR: 1450, avgCommute: 40, market: 'competitive' },
        { id: 'eugene', name: 'Eugene', state: 'OR', colIndex: 104, stateTaxRate: 9.9, medianRent1BR: 1400, avgCommute: 35, market: 'open' },
        { id: 'anchorage', name: 'Anchorage', state: 'AK', colIndex: 125, stateTaxRate: 0, medianRent1BR: 1400, avgCommute: 40, market: 'open' },
        { id: 'honolulu', name: 'Honolulu', state: 'HI', colIndex: 165, stateTaxRate: 11.0, medianRent1BR: 2200, avgCommute: 60, market: 'saturated' },
        { id: 'lexington', name: 'Lexington', state: 'KY', colIndex: 90, stateTaxRate: 4.0, medianRent1BR: 1050, avgCommute: 40, market: 'open' },
        { id: 'durham', name: 'Durham', state: 'NC', colIndex: 100, stateTaxRate: 4.5, medianRent1BR: 1450, avgCommute: 50, market: 'open' },
        { id: 'greensboro', name: 'Greensboro', state: 'NC', colIndex: 90, stateTaxRate: 4.5, medianRent1BR: 1100, avgCommute: 40, market: 'open' },
        { id: 'little_rock', name: 'Little Rock', state: 'AR', colIndex: 88, stateTaxRate: 4.4, medianRent1BR: 1000, avgCommute: 40, market: 'open' },
        { id: 'columbia_sc', name: 'Columbia', state: 'SC', colIndex: 90, stateTaxRate: 6.4, medianRent1BR: 1150, avgCommute: 40, market: 'open' },
        { id: 'mobile', name: 'Mobile', state: 'AL', colIndex: 85, stateTaxRate: 5.0, medianRent1BR: 950, avgCommute: 35, market: 'open' }
    ];

    let currentMode = 'remote';
    let sourceCity = CITIES.find(c => c.id === 'sf');
    let targetCity = CITIES.find(c => c.id === 'boise');
    let targetCities = []; // For Mode A

    const FED_BRACKETS = [
        { rate: 0.10, threshold: 0 },
        { rate: 0.12, threshold: 11600 },
        { rate: 0.22, threshold: 47150 },
        { rate: 0.24, threshold: 100525 },
        { rate: 0.32, threshold: 191950 },
        { rate: 0.35, threshold: 243725 },
        { rate: 0.37, threshold: 609350 }
    ];
    const STD_DEDUCTION = 14600;

    function formatNumber(num) {
        return num.toLocaleString('en-US');
    }

    function parseNumber(str) {
        return parseFloat(str.replace(/,/g, '')) || 0;
    }

    function calculateTax(salary) {
        let taxable = Math.max(0, salary - STD_DEDUCTION);
        let tax = 0;
        for (let i = 0; i < FED_BRACKETS.length; i++) {
            let nextThreshold = FED_BRACKETS[i+1] ? FED_BRACKETS[i+1].threshold : Infinity;
            if (taxable > FED_BRACKETS[i].threshold) {
                let amountInBracket = Math.min(taxable, nextThreshold) - FED_BRACKETS[i].threshold;
                tax += amountInBracket * FED_BRACKETS[i].rate;
            }
        }
        return tax;
    }

    function calculateStateTax(salary, rate) {
        return salary * (rate / 100);
    }

    function handleInput() {
        const salaryInput = document.getElementById('input-salary');
        let val = salaryInput.value.replace(/,/g, '');
        if (!isNaN(val) && val.length > 0) {
            salaryInput.value = formatNumber(parseInt(val));
        }

        const remoteSalaryInput = document.getElementById('input-remote-salary');
        if (remoteSalaryInput) {
            let rVal = remoteSalaryInput.value.replace(/,/g, '');
            if (!isNaN(rVal) && rVal.length > 0) {
                remoteSalaryInput.value = formatNumber(parseInt(rVal));
            }
        }
        
        updateURL();
        render();
    }

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${mode}`).classList.add('active');
        
        const title = document.getElementById('mode-title');
        const salaryLabel = document.getElementById('salary-label');
        const remoteSalaryGroup = document.getElementById('remote-salary-group');
        const targetLabel = document.getElementById('target-label');
        const expensesGroup = document.getElementById('expenses-group');
        const targetCitiesList = document.getElementById('target-cities-list');

        if (mode === 'remote') {
            title.innerText = 'Remote ROI';
            salaryLabel.innerText = 'Current Salary (Office)';
            remoteSalaryGroup.classList.remove('hidden');
            targetLabel.innerText = 'Target City (to move to)';
            expensesGroup.classList.remove('hidden');
            targetCitiesList.classList.add('hidden');
            if (!targetCity) targetCity = CITIES.find(c => c.id === 'boise');
            document.getElementById('search-target').placeholder = "Search city...";
        } else {
            title.innerText = 'Compare Cities';
            salaryLabel.innerText = 'Base Salary';
            remoteSalaryGroup.classList.add('hidden');
            targetLabel.innerText = 'Compare Against';
            expensesGroup.classList.add('hidden');
            targetCitiesList.classList.remove('hidden');
            document.getElementById('search-target').placeholder = "Add up to 3 cities...";
        }

        updateURL();
        render();
    }

    function showDropdown(type) {
        const dropdown = document.getElementById(`dropdown-${type}`);
        dropdown.innerHTML = '';
        CITIES.forEach(city => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerText = `${city.name}, ${city.state}`;
            item.onclick = () => selectCity(type, city);
            dropdown.appendChild(item);
        });
        dropdown.classList.add('show');
    }

    function filterCities(type) {
        const input = document.getElementById(`search-${type}`).value.toLowerCase();
        const dropdown = document.getElementById(`dropdown-${type}`);
        dropdown.innerHTML = '';
        const filtered = CITIES.filter(c => c.name.toLowerCase().includes(input) || c.state.toLowerCase().includes(input));
        filtered.forEach(city => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerText = `${city.name}, ${city.state}`;
            item.onclick = () => selectCity(type, city);
            dropdown.appendChild(item);
        });
        dropdown.classList.add('show');
    }

    function selectCity(type, city) {
        if (type === 'source') {
            sourceCity = city;
            document.getElementById('search-source').value = `${city.name}, ${city.state}`;
            document.getElementById('input-commute').value = city.avgCommute;
        } else {
            if (currentMode === 'remote') {
                targetCity = city;
                document.getElementById('search-target').value = `${city.name}, ${city.state}`;
            } else {
                if (targetCities.length < 3 && !targetCities.find(c => c.id === city.id)) {
                    targetCities.push(city);
                    updateTargetCitiesList();
                    document.getElementById('search-target').value = '';
                }
            }
        }
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        updateURL();
        render();
    }

    function removeTargetCity(id) {
        targetCities = targetCities.filter(c => c.id !== id);
        updateTargetCitiesList();
        updateURL();
        render();
    }

    function updateTargetCitiesList() {
        const list = document.getElementById('target-cities-list');
        list.innerHTML = '';
        targetCities.forEach(city => {
            const item = document.createElement('div');
            item.className = 'selected-city';
            item.innerHTML = `<span>${city.name}, ${city.state}</span><span class="remove-city" onclick="removeTargetCity('${city.id}')">&times;</span>`;
            list.appendChild(item);
        });
    }

    function updateURL() {
        const params = new URLSearchParams();
        params.set('mode', currentMode);
        params.set('salary', parseNumber(document.getElementById('input-salary').value));
        params.set('from', sourceCity.id);
        
        if (currentMode === 'remote') {
            params.set('rcity', targetCity.id);
            params.set('rsalary', parseNumber(document.getElementById('input-remote-salary').value));
        } else {
            params.set('to', targetCities.map(c => c.id).join(','));
        }
        
        window.history.replaceState({}, '', `?${params.toString()}`);
    }

    function parseParams() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode')) switchMode(params.get('mode'));
        if (params.get('salary')) document.getElementById('input-salary').value = formatNumber(parseInt(params.get('salary')));
        if (params.get('from')) {
            const city = CITIES.find(c => c.id === params.get('from'));
            if (city) selectCity('source', city);
        }
        if (params.get('rcity')) {
            const city = CITIES.find(c => c.id === params.get('rcity'));
            if (city) selectCity('target', city);
        }
        if (params.get('rsalary')) document.getElementById('input-remote-salary').value = formatNumber(parseInt(params.get('rsalary')));
        if (params.get('to')) {
            const ids = params.get('to').split(',');
            targetCities = ids.map(id => CITIES.find(c => c.id === id)).filter(Boolean);
            updateTargetCitiesList();
        }
    }

    function render() {
        const panel = document.getElementById('results-panel');
        const salary = parseNumber(document.getElementById('input-salary').value) || 120000;
        
        if (currentMode === 'remote') {
            const rSalary = parseNumber(document.getElementById('input-remote-salary').value) || (salary - 10000);
            const commute = parseNumber(document.getElementById('input-commute').value) || sourceCity.avgCommute;
            const misc = parseNumber(document.getElementById('input-misc').value) || 300;

            const officeTax = calculateTax(salary) + calculateStateTax(salary, sourceCity.stateTaxRate);
            const officeNet = (salary - officeTax) / 12 - commute - misc - sourceCity.medianRent1BR;

            const remoteTax = calculateTax(rSalary) + calculateStateTax(rSalary, targetCity.stateTaxRate);
            const remoteNet = (rSalary - remoteTax) / 12 - targetCity.medianRent1BR;

            const monthlyDelta = remoteNet - officeNet;
            const annualDelta = monthlyDelta * 12;
            const isWorthIt = monthlyDelta > 0;

            const tweetText = isWorthIt 
                ? `Taking a $${formatNumber(salary - rSalary)} pay cut to work remote from ${targetCity.name} saves me $${formatNumber(Math.round(annualDelta))}/year after taxes and rent. The math hits different. #RemoteWork`
                : `Turns out my $${formatNumber(salary)} ${sourceCity.name} salary needs to drop below $${formatNumber(Math.round(rSalary + monthlyDelta * 12))} remote before it stops making financial sense. Checked the math. #RemoteWork`;

            panel.innerHTML = `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h2 class="result-title">${targetCity.name}, ${targetCity.state}</h2>
                        <span class="badge ${isWorthIt ? 'badge-better' : 'badge-worse'}">${isWorthIt ? 'WORTH IT' : 'NOT WORTH IT'}</span>
                    </div>
                    <p class="delta-label">Net Monthly Difference</p>
                    <div class="big-number ${isWorthIt ? 'positive' : 'negative'}" style="color: ${isWorthIt ? 'var(--better)' : 'var(--worse)'}">
                        ${monthlyDelta >= 0 ? '+' : ''}$${formatNumber(Math.round(monthlyDelta))}
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(100, Math.max(10, 50 + (monthlyDelta/2000)*50))}%; background: ${isWorthIt ? 'var(--better)' : 'var(--worse)'}"></div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <span>Office Net (Monthly)</span>
                            <span>$${formatNumber(Math.round(officeNet))}</span>
                        </div>
                        <div class="stat-item">
                            <span>Remote Net (Monthly)</span>
                            <span>$${formatNumber(Math.round(remoteNet))}</span>
                        </div>
                    </div>

                    <div style="margin: 20px 0;">
                        <div class="delta-row"><span class="delta-label">Annual Savings</span><span class="delta-value ${isWorthIt ? 'positive' : 'negative'}">${annualDelta >= 0 ? '+' : ''}$${formatNumber(Math.round(annualDelta))}</span></div>
                        <div class="delta-row"><span class="delta-label">Tax Difference</span><span class="delta-value">${formatNumber(Math.round((officeTax - remoteTax)/12))}/mo</span></div>
                        <div class="delta-row"><span class="delta-label">Rent Difference</span><span class="delta-value">${formatNumber(sourceCity.medianRent1BR - targetCity.medianRent1BR)}/mo</span></div>
                    </div>

                    <div class="one-liner">
                        Your <strong>$${formatNumber(salary)}</strong> in ${sourceCity.name} is mathematically equivalent to <strong>$${formatNumber(Math.round(salary + (remoteNet - officeNet) * 12))}</strong> in ${targetCity.name} while working remote.
                    </div>

                    <div class="tweet-card">
                        <p class="tweet-text">"${tweetText}"</p>
                        <button class="copy-btn" onclick="copyTweet('${tweetText.replace(/'/g, "\\'")}')">Copy Tweet</button>
                    </div>
                </div>
            `;
        } else {
            // Mode A: Comparison
            if (targetCities.length === 0) {
                panel.innerHTML = '<div class="card"><p style="text-align:center; color: var(--text-muted);">Add up to 3 target cities to compare.</p></div>';
                return;
            }

            let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">';
            
            targetCities.forEach(city => {
                const sourceTax = calculateTax(salary) + calculateStateTax(salary, sourceCity.stateTaxRate);
                const sourceNetMonthly = (salary - sourceTax) / 12 - sourceCity.medianRent1BR;
                
                // Adjusted salary: salary * (targetCol / sourceCol)
                const adjSalary = Math.round(salary * (city.colIndex / sourceCity.colIndex));
                const targetTax = calculateTax(adjSalary) + calculateStateTax(adjSalary, city.stateTaxRate);
                const targetNetMonthly = (adjSalary - targetTax) / 12 - city.medianRent1BR;
                
                const rentDelta = city.medianRent1BR - sourceCity.medianRent1BR;
                const netDelta = targetNetMonthly - sourceNetMonthly;
                
                let verdict = 'SIMILAR';
                let badgeClass = 'badge-similar';
                if (netDelta > 200) { verdict = 'BETTER'; badgeClass = 'badge-better'; }
                if (netDelta < -200) { verdict = 'WORSE'; badgeClass = 'badge-worse'; }

                html += `
                    <div class="card" style="border-top: 4px solid ${verdict === 'BETTER' ? 'var(--better)' : verdict === 'WORSE' ? 'var(--worse)' : 'var(--similar)'}">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                            <div>
                                <h3 style="font-size: 20px;">${city.name}</h3>
                                <p style="font-size: 12px; color: var(--text-muted);">${city.state}</p>
                            </div>
                            <span class="badge ${badgeClass}">${verdict}</span>
                        </div>
                        
                        <div class="input-group">
                            <label>Adjusted Salary Equivalent</label>
                            <div class="big-number" style="font-size: 32px;">$${formatNumber(adjSalary)}</div>
                        </div>

                        <div style="border-top: 1px solid var(--border); padding-top: 15px;">
                            <div class="delta-row"><span class="delta-label">Est. Take-Home</span><span class="delta-value">$${formatNumber(Math.round((adjSalary - targetTax)/12))}/mo</span></div>
                            <div class="delta-row"><span class="delta-label">Rent Delta</span><span class="delta-value ${rentDelta <= 0 ? 'positive' : 'negative'}">${rentDelta > 0 ? '+' : ''}$${formatNumber(rentDelta)}/mo</span></div>
                        </div>

                        <div class="one-liner" style="margin-top: 15px;">
                            Your $${formatNumber(Math.round(salary/1000))}k in ${sourceCity.name} lives like <strong>$${formatNumber(Math.round(adjSalary/1000))}k</strong> here.
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            panel.innerHTML = html;
        }
    }

    function copyTweet(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Tweet copied to clipboard!');
        });
    }

    // Close dropdowns on click outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.city-select-wrapper')) {
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        }
    });

    // Initialize
    window.onload = () => {
        parseParams();
        document.getElementById('search-source').value = `${sourceCity.name}, ${sourceCity.state}`;
        document.getElementById('search-target').value = `${targetCity.name}, ${targetCity.state}`;
        document.getElementById('input-commute').value = sourceCity.avgCommute;
        render();
    };
</script>

</body>
</html>
