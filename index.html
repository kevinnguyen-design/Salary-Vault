<html lang="en">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I know if a remote pay cut is worth it?",
        "acceptedAnswer": { "@type": "Answer", "text": "Compare monthly net pay after federal and state taxes, then subtract rent and office-only costs like commute and work spending." }
      },
      {
        "@type": "Question",
        "name": "Does this include taxes?",
        "acceptedAnswer": { "@type": "Answer", "text": "Yes. The calculator uses 2024 US federal tax brackets with the single-filer standard deduction and flat state tax estimates." }
      },
      {
        "@type": "Question",

        "acceptedAnswer": { "@type": "Answer", "text": "Yes. Every input updates URL parameters so your comparison can be shared directly." }
      }
    ]
  }
  </script>

  <style>
    :root {
      --bg: #f2efff;
      --white: #ffffff;
      --field: #f2efff;
      --border: #9a9a9a;
      --text: #111111;
      --muted: #444444;
      --green: #059669;
      --green-soft: #beffdc;
      --gray-soft: #ece9f9;
      --shadow: 0 4px 16px 1px rgba(0, 0, 0, 0.18);
      --header-shadow: 0 4px 7px -1px rgba(0, 0, 0, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      background: var(--white);
      box-shadow: var(--header-shadow);
      padding: 32px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .brand {
      font-size: 36px;
      font-weight: 700;
      color: var(--green);
      text-decoration: none;
      line-height: 1;
    }

    .tabs {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 3px;
      background: #e8e6f2;
    }

    .tab {
      border: 0;
      background: transparent;
      border-radius: 30px;
      height: 38px;
      padding: 0 18px;
      font-size: 15px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .tab.active {
      background: var(--green);
      color: #fff;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.35);
    }

    .tab:not(.active):hover {
      background: #dddae9;
    }

    .header-icons {
      display: flex;
      align-items: center;
      gap: 20px;
      color: #2a2a2a;
    }

    .header-icons svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 36px 28px 40px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 28px;
      align-items: start;
    }

    .panel, .result-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 15px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 28px;
    }

    .title {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.08;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field > label {
      display: block;
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 11px;
    }

    .input, .city-chip, .add-city {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--field);
      font-size: 26px;
      color: var(--muted);
      padding: 14px 12px;
      line-height: 1.2;
    }

    .input {
      outline: 0;
      font-weight: 600;
      color: var(--text);
    }

    .input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.14);
    }

    .city-picker { position: relative; }

    .dropdown {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      z-index: 100;
      max-height: 210px;
      overflow-y: auto;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .dropdown.show { display: block; }

    .dropdown-item {
      font-size: 20px;
      padding: 12px;
      color: var(--muted);
      cursor: pointer;
    }

    .dropdown-item:hover { background: #f3f1ff; color: var(--green); }

    .chip-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 14px;
    }

    .city-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 26px;
      color: var(--muted);
      padding: 14px 12px;
    }

    .chip-remove {
      border: 0;
      background: transparent;
      font-size: 28px;
      color: #444;
      line-height: 1;
      cursor: pointer;
      width: 32px;
      height: 32px;
    }

    .add-city {
      border-style: dashed;
      border-radius: 10px;
      color: var(--green);
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      cursor: pointer;
    }

    .add-city .plus {
      font-size: 24px;
      line-height: 0;
      margin-top: -3px;
    }

    .result-stack {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .result-card {
      padding: 28px;
      border-width: 2px;
    }

    .result-card.better { border-color: var(--green); }
    .result-card.worse { border-color: #b4b4b4; }
    .result-card.similar { border-color: #9a9a9a; }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .result-city {
      font-size: 42px;
      font-weight: 700;
      line-height: 1.2;
    }

    .badge {
      border-radius: 16px;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.better { background: var(--green-soft); color: var(--green); }
    .badge.similar { background: var(--gray-soft); color: var(--muted); }
    .badge.worse { background: #f7e3e3; color: #7f1d1d; }

    .meta-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .money {
      font-size: 50px;
      font-weight: 700;
      margin-bottom: 14px;
      line-height: 1.06;
    }

    .split {
      border-top: 1px solid #acabaa;
      border-bottom: 1px solid #acabaa;
      padding: 14px 10px;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .vline { width: 1px; background: var(--border); }

    .split-label {
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .split-value {
      font-size: 34px;
      font-weight: 600;
      color: var(--text);
    }

    .delta-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 20px;
    }

    .delta-row .label { color: var(--muted); }
    .delta-row .value { font-weight: 600; }
    .delta-row .value.better { color: var(--green); }
    .delta-row .value.similar { color: #8d8d8d; }
    .delta-row .value.worse { color: #b42318; }

    .bar-track {
      height: 10px;
      border-radius: 6px;
      background: #9a9a9a;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    .liner {
      background: var(--field);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 14px;
      font-size: 24px;
      color: var(--muted);
      line-height: 1.25;
    }

    .liner strong { color: var(--green); }

    .tweet {
      margin-top: 16px;
      border: 1px solid #91d4f9;
      background: #eef8ff;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      color: #1d3557;
    }

    .tweet button {
      margin-top: 12px;
      border: 0;
      border-radius: 18px;
      background: #1d9bf0;
      color: #fff;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 28px 30px;
      font-size: 14px;
      color: var(--muted);
      display: grid;
      gap: 6px;
      text-align: center;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      width: fit-content;
      justify-self: center;
      padding: 6px 10px;
    }

    .ad-slot { display: none !important; }

    @media (max-width: 1024px) {
      .page {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .topbar { padding: 14px; position: static; }
      .brand { font-size: 30px; }
      .header-icons { display: none; }
      .tab { font-size: 15px; padding: 0 12px; height: 36px; }
      .page { padding: 16px 14px 24px; gap: 16px; }
      .panel { padding: 14px; }
      .title, .result-city { font-size: 34px; }
      .field > label, .meta-label, .split-label { font-size: 11px; }
      .input, .city-chip, .add-city, .liner { font-size: 20px; min-height: 46px; padding: 12px 10px; }
      .money { font-size: 40px; }
      .split-value { font-size: 30px; }
      .delta-row { font-size: 17px; }
      .badge { font-size: 16px; min-height: 28px; }
      .tweet { font-size: 14px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#">SalaryVault</a>
    <nav class="tabs" aria-label="Mode">
      <button type="button" class="tab" id="tab-col">Compare Cities</button>
      <button type="button" class="tab" id="tab-remote">Remote ROI</button>
    </nav>
    <div class="header-icons" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M20 16.5a3.5 3.5 0 0 0-2.7 1.3L8.9 13a3.5 3.5 0 0 0 0-2l8.4-4.8A3.5 3.5 0 1 0 16.5 5a3.6 3.6 0 0 0 .1.9L8.2 10.7a3.5 3.5 0 1 0 0 2.6l8.4 4.8a3.6 3.6 0 0 0-.1.9 3.5 3.5 0 1 0 3.5-3.5Z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1 0l2.8-2.8a5 5 0 0 0-7.1-7.1L10 5"/><path d="M14 11a5 5 0 0 0-7.1 0L4.1 13.8a5 5 0 1 0 7.1 7.1L14 19"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M5 14v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5"/></svg>
    </div>
  </header>

  <main class="page">
    <aside class="panel">
      <h1 class="title">Comparison</h1>

      <div class="field">
        <label for="input-salary">Base Salary</label>
        <input class="input" id="input-salary" type="text" inputmode="numeric" value="120,000">
      </div>

      <div class="field city-picker">
        <label for="search-source">Source City</label>
        <input class="input" id="search-source" type="text" autocomplete="off">
        <div id="dropdown-source" class="dropdown"></div>
      </div>

      <div class="field city-picker">
        <label id="target-label" for="search-target">Compare Against</label>
        <input class="input" id="search-target" type="text" autocomplete="off" placeholder="Add city">
        <div id="dropdown-target" class="dropdown"></div>
      </div>

      <div id="chip-list" class="chip-list"></div>
      <button type="button" class="add-city" id="add-city-btn"><span class="plus">+</span> Add City</button>

      <div id="remote-fields" style="display:none; margin-top:12px;">
        <div class="field">
          <label for="input-remote-salary">Remote Salary</label>
          <input class="input" id="input-remote-salary" type="text" inputmode="numeric" value="110,000">
        </div>
        <div class="field">
          <label for="input-commute">Commute Cost / Month</label>
          <input class="input" id="input-commute" type="text" inputmode="numeric" value="98">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label for="input-misc">Wardrobe/Lunch / Month</label>
          <input class="input" id="input-misc" type="text" inputmode="numeric" value="300">
        </div>

    </aside>

    <section id="results" class="result-stack"></section>
  </main>

  <footer class="footer">
    <p>Not financial advice. Tax estimates use standard deduction, single filer, 2024 federal brackets. State taxes are flat estimates.</p>
    <p>Data sourced from BLS, Census, and public CoL indices (2024).</p>
    <a href="#">GitHub</a>
  </footer>

  <div id="ad-top" class="ad-slot" data-size="728x90"></div>
  <div id="ad-mobile" class="ad-slot" data-size="320x50"></div>
  <div id="ad-results" class="ad-slot" data-size="300x250"></div>

  <script>
    const state = {
      mode: "col",
      salary: 120000,
      remoteSalary: 110000,
      commuteMonthly: 98,
      miscMonthly: 300,
      sourceCityId: "nyc",
      targetCityId: "boise",
      targetCityIds: ["austin", "denver", "portland"],
      cities: []
    };

    const FEDERAL_BRACKETS_2024_SINGLE = [
      { rate: 0.1, threshold: 0 },
      { rate: 0.12, threshold: 11600 },
      { rate: 0.22, threshold: 47150 },
      { rate: 0.24, threshold: 100525 },
      { rate: 0.32, threshold: 191950 },
      { rate: 0.35, threshold: 243725 },
      { rate: 0.37, threshold: 609350 }
    ];
    const STANDARD_DEDUCTION_2024_SINGLE = 14600;
    let apiAvailable = location.protocol !== "file:";
    const FALLBACK_CITIES = [
      { id: "nyc", name: "New York City", state: "NY", colIndex: 128, stateTaxRate: 5.85, medianRent1BR: 4100, avgCommuteCostMonthly: 132 },
      { id: "sf", name: "San Francisco", state: "CA", colIndex: 122, stateTaxRate: 9.3, medianRent1BR: 3100, avgCommuteCostMonthly: 98 },
      { id: "austin", name: "Austin", state: "TX", colIndex: 101, stateTaxRate: 0, medianRent1BR: 1575, avgCommuteCostMonthly: 42 },
      { id: "denver", name: "Denver", state: "CO", colIndex: 100.4, stateTaxRate: 4.4, medianRent1BR: 1455, avgCommuteCostMonthly: 88 },
      { id: "portland", name: "Portland", state: "OR", colIndex: 112, stateTaxRate: 9.9, medianRent1BR: 1500, avgCommuteCostMonthly: 70 },
      { id: "boise", name: "Boise", state: "ID", colIndex: 101.7, stateTaxRate: 5.8, medianRent1BR: 1500, avgCommuteCostMonthly: 45 },
      { id: "raleigh", name: "Raleigh", state: "NC", colIndex: 102.5, stateTaxRate: 4.5, medianRent1BR: 1575, avgCommuteCostMonthly: 55 },
      { id: "seattle", name: "Seattle", state: "WA", colIndex: 118, stateTaxRate: 0, medianRent1BR: 2040, avgCommuteCostMonthly: 99 }
    ];

    function byId(id) {
      return state.cities.find((city) => city.id === id);
    }

    function fmt(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function parseNum(value) {
      return Number(String(value || "0").replace(/[^0-9.-]/g, "")) || 0;
    }

    function formatField(input) {
      const parsed = parseNum(input.value);
      input.value = parsed ? fmt(Math.round(parsed)) : "";
      return parsed;
    }

    function federalTax(salary) {
      const taxable = Math.max(0, Number(salary || 0) - STANDARD_DEDUCTION_2024_SINGLE);
      let tax = 0;
      for (let i = 0; i < FEDERAL_BRACKETS_2024_SINGLE.length; i += 1) {
        const current = FEDERAL_BRACKETS_2024_SINGLE[i];
        const next = FEDERAL_BRACKETS_2024_SINGLE[i + 1];
        const nextThreshold = next ? next.threshold : Number.POSITIVE_INFINITY;
        if (taxable > current.threshold) {
          tax += (Math.min(taxable, nextThreshold) - current.threshold) * current.rate;
        }
      }
      return tax;
    }

    function stateTax(salary, rate) {
      return Number(salary || 0) * (Number(rate || 0) / 100);
    }

    function fallbackRemoteResult(source, target) {
      const officeTax = federalTax(state.salary) + stateTax(state.salary, source.stateTaxRate);
      const remoteTax = federalTax(state.remoteSalary) + stateTax(state.remoteSalary, target.stateTaxRate);
      const officeNet = (state.salary - officeTax) / 12 - state.commuteMonthly - state.miscMonthly - source.medianRent1BR;
      const remoteNet = (state.remoteSalary - remoteTax) / 12 - target.medianRent1BR;
      const delta = remoteNet - officeNet;
      return {
        office: { monthlyNet: officeNet, taxMonthly: officeTax / 12, rentMonthly: source.medianRent1BR, commuteMonthly: state.commuteMonthly, miscMonthly: state.miscMonthly },
        remote: { monthlyNet: remoteNet, taxMonthly: remoteTax / 12, rentMonthly: target.medianRent1BR },
        monthlyDelta: delta,
        annualDelta: delta * 12,
        verdict: delta >= 0 ? "WORTH IT" : "NOT WORTH IT"
      };
    }

    function fallbackCompareResult(source) {
      return state.targetCityIds
        .map((id) => byId(id))
        .filter(Boolean)
        .slice(0, 3)
        .map((target) => {
          const sourceTax = federalTax(state.salary) + stateTax(state.salary, source.stateTaxRate);
          const sourceNetMonthly = (state.salary - sourceTax) / 12 - source.medianRent1BR;
          const adjustedSalary = Math.round(state.salary * (target.colIndex / source.colIndex));
          const targetTax = federalTax(adjustedSalary) + stateTax(adjustedSalary, target.stateTaxRate);
          const targetNetMonthly = (adjustedSalary - targetTax) / 12 - target.medianRent1BR;
          const netDelta = targetNetMonthly - sourceNetMonthly;
          let verdict = "SIMILAR";
          if (netDelta > 200) verdict = "BETTER";
          if (netDelta < -200) verdict = "WORSE";
          return {
            cityId: target.id,
            cityName: target.name,
            state: target.state,
            adjustedSalary,
            estTakeHomeMonthly: Math.round((adjustedSalary - targetTax) / 12),
            rentDelta: target.medianRent1BR - source.medianRent1BR,
            netDelta,
            verdict
          };
        });
    }

    async function apiCalculate(payload) {
      if (!apiAvailable) throw new Error("API disabled");
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 1200);
      const response = await fetch("/api/calculate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
        signal: controller.signal
      });
      clearTimeout(timer);
      if (!response.ok) throw new Error(`API ${response.status}`);
      const json = await response.json();
      return json.result;
    }

    function renderChips() {
      const el = document.getElementById("chip-list");
      if (state.mode !== "col") {
        el.innerHTML = "";
        return;
      }
      el.innerHTML = state.targetCityIds
        .map((id) => byId(id))
        .filter(Boolean)
        .map((city) => `<div class="city-chip">${city.name}, ${city.state}<button class="chip-remove" data-id="${city.id}">&times;</button></div>`)
        .join("");
      el.querySelectorAll(".chip-remove").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.targetCityIds = state.targetCityIds.filter((id) => id !== btn.dataset.id);
          updateUrl();
          render();
        });
      });
    }

    function applyModeUI() {
      const col = state.mode === "col";
      document.getElementById("tab-col").classList.toggle("active", col);
      document.getElementById("tab-remote").classList.toggle("active", !col);
      document.getElementById("target-label").textContent = col ? "Compare Against" : "Target City";
      document.getElementById("add-city-btn").style.display = col ? "flex" : "none";
      document.getElementById("remote-fields").style.display = col ? "none" : "block";
      document.querySelector(".title").textContent = col ? "Comparison" : "Remote ROI";
      renderChips();
    }

    function verdictStyle(verdict) {
      if (verdict === "BETTER") return { cls: "better", text: "Better", icon: "↑" };
      if (verdict === "WORSE") return { cls: "worse", text: "Worse", icon: "↓" };
      return { cls: "similar", text: "Neutral", icon: "−" };
    }

    function makeCard(card, source) {
      const style = verdictStyle(card.verdict);
      const pct = Math.max(-99, Math.min(99, Math.round((card.netDelta / Math.max(1, state.salary / 12)) * 100)));
      const progress = Math.min(100, Math.max(8, 50 + pct));
      const gross = state.salary;
      const netAnnual = card.estTakeHomeMonthly * 12;
      const colorClass = style.cls === "better" ? "better" : style.cls === "worse" ? "worse" : "similar";
      const deltaClass = style.cls === "better" ? "better" : style.cls === "worse" ? "worse" : "similar";
      const fillColor = style.cls === "better" ? "var(--green)" : style.cls === "worse" ? "#7f1d1d" : "#4b4b4b";

      return `
        <article class="result-card ${colorClass}">
          <div class="result-head">
            <h2 class="result-city">${card.cityName}, ${card.state}</h2>
            <span class="badge ${colorClass}">${style.icon} ${style.text} (${pct >= 0 ? "+" : ""}${pct}%)</span>
          </div>
          <p class="meta-label">Adjusted Salary Equivalent</p>
          <div class="money">$${fmt(card.adjustedSalary)}</div>
          <div class="split">
            <div>
              <p class="split-label">Gross Income</p>
              <p class="split-value">$${fmt(gross)}</p>
            </div>
            <div class="vline"></div>
            <div>
              <p class="split-label">Net (After Taxes)</p>
              <p class="split-value">$${fmt(netAnnual)}</p>
            </div>
          </div>
          <div class="delta-row">
            <span class="label">Housing Delta</span>
            <span class="value ${deltaClass}">${card.rentDelta > 0 ? "+" : ""}$${fmt(Math.round(card.rentDelta))}/mo</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${progress}%; background:${fillColor};"></div></div>
          <p class="liner">Your $${fmt(gross)} in ${source.name} lives like <strong>$${fmt(Math.round(card.adjustedSalary / 1000) * 1000)}</strong> here.</p>
        </article>
      `;
    }

    function renderRemoteCard(result, source, target) {
      const good = result.monthlyDelta >= 0;
      const fill = Math.min(100, Math.max(8, 50 + result.monthlyDelta / 30));
      const color = good ? "var(--green)" : "#7f1d1d";
      const tweet = good
        ? `Taking a $${fmt(Math.max(0, state.salary - state.remoteSalary))} pay cut to work remote from ${target.name} saves me $${fmt(Math.round(result.annualDelta))}/year after taxes and rent. The math hits different. https://yourdomain.com`
        : `Turns out my $${fmt(state.salary)} ${source.name} salary needs to drop below $${fmt(Math.round(state.remoteSalary + result.monthlyDelta * 12))} remote before it stops making financial sense. Checked the math. https://yourdomain.com`;
      return `
        <article class="result-card ${good ? "better" : "worse"}">
          <div class="result-head">
            <h2 class="result-city">${target.name}, ${target.state}</h2>
            <span class="badge ${good ? "better" : "worse"}">${good ? "↑ WORTH IT" : "↓ NOT WORTH IT"}</span>
          </div>
          <p class="meta-label">Net Monthly Difference</p>
          <div class="money" style="color:${color};">${result.monthlyDelta >= 0 ? "+" : ""}$${fmt(Math.round(result.monthlyDelta))}</div>
          <div class="split">
            <div>
              <p class="split-label">Office Net /mo</p>
              <p class="split-value">$${fmt(Math.round(result.office.monthlyNet))}</p>
            </div>
            <div class="vline"></div>
            <div>
              <p class="split-label">Remote Net /mo</p>
              <p class="split-value">$${fmt(Math.round(result.remote.monthlyNet))}</p>
            </div>
          </div>
          <div class="delta-row">
            <span class="label">Annual Delta</span>
            <span class="value ${good ? "better" : "worse"}">${result.annualDelta >= 0 ? "+" : ""}$${fmt(Math.round(result.annualDelta))}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${fill}%; background:${color};"></div></div>
          <p class="liner">Your $${fmt(state.salary)} in ${source.name} lives like <strong>$${fmt(Math.round(state.salary + result.monthlyDelta * 12))}</strong> in ${target.name} after rent and tax assumptions.</p>
          <div class="tweet">
            <p>"${tweet}"</p>
            <button type="button" id="copy-tweet">Copy Tweet</button>
          </div>
        </article>
      `;
    }

    async function render() {
      const source = byId(state.sourceCityId);
      const target = byId(state.targetCityId);
      if (!source || !target) return;

      applyModeUI();
      updateFormValues();
      updateUrl();

      const results = document.getElementById("results");

      if (state.mode === "col") {
        let cards;
        try {
          const result = await apiCalculate({
            mode: "col",
            salary: state.salary,
            sourceCityId: state.sourceCityId,
            targetCityIds: state.targetCityIds
          });
          cards = result.cards || [];
        } catch (_error) {
          apiAvailable = false;
          cards = fallbackCompareResult(source);
        }
        results.innerHTML = cards.map((card) => makeCard(card, source)).join("") || "<article class=\"result-card\"><p class=\"liner\">Add up to 3 target cities to compare.</p></article>";
      } else {
        let result;
        try {
          result = await apiCalculate({
            mode: "remote",
            salary: state.salary,
            remoteSalary: state.remoteSalary,
            sourceCityId: state.sourceCityId,
            targetCityId: state.targetCityId,
            commuteMonthly: state.commuteMonthly,
            miscMonthly: state.miscMonthly
          });
        } catch (_error) {
          apiAvailable = false;
          result = fallbackRemoteResult(source, target);
        }
        results.innerHTML = renderRemoteCard(result, source, target);
        const copy = document.getElementById("copy-tweet");
        if (copy) {
          copy.addEventListener("click", async () => {
            try {
              const text = copy.parentElement.querySelector("p").textContent.replace(/^"|"$/g, "");
              await navigator.clipboard.writeText(text);
              window.alert("Tweet copied to clipboard.");
            } catch (_error) {
              window.alert("Clipboard blocked. Copy manually.");
            }
          });
        }
      }
    }

    function updateFormValues() {
      document.getElementById("input-salary").value = fmt(state.salary);
      document.getElementById("input-remote-salary").value = fmt(state.remoteSalary);
      document.getElementById("input-commute").value = fmt(state.commuteMonthly);
      document.getElementById("input-misc").value = fmt(state.miscMonthly);
      const source = byId(state.sourceCityId);
      const target = byId(state.targetCityId);
      document.getElementById("search-source").value = source ? `${source.name}, ${source.state}` : "";
      document.getElementById("search-target").value = state.mode === "remote" && target ? `${target.name}, ${target.state}` : "";
    }

    function updateUrl() {
      const p = new URLSearchParams();
      p.set("mode", state.mode);
      p.set("salary", Math.round(state.salary));
      p.set("from", state.sourceCityId);
      p.set("commute", Math.round(state.commuteMonthly));
      p.set("misc", Math.round(state.miscMonthly));
      if (state.mode === "remote") {
        p.set("rcity", state.targetCityId);
        p.set("rsalary", Math.round(state.remoteSalary));
      } else {
        p.set("to", state.targetCityIds.join(","));
      }
      window.history.replaceState({}, "", `?${p.toString()}`);
    }

    function parseUrl() {
      const p = new URLSearchParams(window.location.search);
      const mode = p.get("mode");
      if (mode === "col" || mode === "remote") state.mode = mode;
      state.salary = parseNum(p.get("salary")) || state.salary;
      state.remoteSalary = parseNum(p.get("rsalary")) || state.remoteSalary;
      state.commuteMonthly = parseNum(p.get("commute")) || state.commuteMonthly;
      state.miscMonthly = parseNum(p.get("misc")) || state.miscMonthly;
      const from = p.get("from");
      if (from && byId(from)) state.sourceCityId = from;
      const rcity = p.get("rcity");
      if (rcity && byId(rcity)) state.targetCityId = rcity;
      const to = p.get("to");
      if (to) {
        const ids = to.split(",").filter((id) => byId(id)).slice(0, 3);
        if (ids.length) state.targetCityIds = ids;
      }
    }

    function setupCitySearch(type) {
      const input = document.getElementById(`search-${type}`);
      const dropdown = document.getElementById(`dropdown-${type}`);
      const draw = (q) => {
        const query = String(q || "").toLowerCase();
        dropdown.innerHTML = state.cities
          .filter((city) => `${city.name}, ${city.state}`.toLowerCase().includes(query))
          .slice(0, 50)
          .map((city) => `<div class="dropdown-item" data-id="${city.id}">${city.name}, ${city.state}</div>`)
          .join("");
        dropdown.classList.add("show");
        dropdown.querySelectorAll(".dropdown-item").forEach((item) => {
          item.addEventListener("click", () => {
            const id = item.dataset.id;
            if (type === "source") {
              state.sourceCityId = id;
              const city = byId(id);
              if (city) state.commuteMonthly = city.avgCommuteCostMonthly;
            } else if (state.mode === "remote") {
              state.targetCityId = id;
            } else if (!state.targetCityIds.includes(id) && state.targetCityIds.length < 3) {
              state.targetCityIds.push(id);
            }
            input.value = type === "target" && state.mode === "col" ? "" : item.textContent;
            dropdown.classList.remove("show");
            render();
          });
        });
      };
      input.addEventListener("focus", () => draw(input.value));
      input.addEventListener("input", () => draw(input.value));
    }

    async function init() {
      try {
        const response = await fetch("./data/cities.json", { cache: "no-store" });
        state.cities = await response.json();
      } catch (_error) {
        state.cities = FALLBACK_CITIES;
      }
      if (!byId(state.sourceCityId)) state.sourceCityId = state.cities[0].id;
      if (!byId(state.targetCityId)) state.targetCityId = state.cities[1].id;

      parseUrl();
      updateFormValues();
      setupCitySearch("source");
      setupCitySearch("target");

      document.getElementById("tab-col").addEventListener("click", () => {
        state.mode = "col";
        applyModeUI();
        render();
      });
      document.getElementById("tab-remote").addEventListener("click", () => {
        state.mode = "remote";
        applyModeUI();
        render();
      });
      document.getElementById("add-city-btn").addEventListener("click", () => document.getElementById("search-target").focus());

      document.getElementById("input-salary").addEventListener("input", (e) => { state.salary = formatField(e.target); render(); });
      document.getElementById("input-remote-salary").addEventListener("input", (e) => { state.remoteSalary = formatField(e.target); render(); });
      document.getElementById("input-commute").addEventListener("input", (e) => { state.commuteMonthly = formatField(e.target); render(); });
      document.getElementById("input-misc").addEventListener("input", (e) => { state.miscMonthly = formatField(e.target); render(); });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".city-picker")) {
          document.querySelectorAll(".dropdown").forEach((d) => d.classList.remove("show"));
        }
      });

      render();
    }

    init().catch((error) => {
      document.getElementById("results").innerHTML = `<article class="result-card"><p class="liner">Failed to initialize: ${error.message}</p></article>`;
    });
  </script>
</body>
</html>
