  <script>
    const state = {
      mode: "remote",
      salary: 150000,
      remoteSalary: 130000,
      commuteMonthly: 98,
      miscMonthly: 300,
      sourceCityId: "sf",
      targetCityId: "boise",
      targetCityIds: ["austin", "denver", "raleigh"],
      cities: []
    };

    const FEDERAL_BRACKETS_2024_SINGLE = [
      { rate: 0.1, threshold: 0 },
      { rate: 0.12, threshold: 11600 },
      { rate: 0.22, threshold: 47150 },
      { rate: 0.24, threshold: 100525 },
      { rate: 0.32, threshold: 191950 },
      { rate: 0.35, threshold: 243725 },
      { rate: 0.37, threshold: 609350 }
    ];
    const STANDARD_DEDUCTION_2024_SINGLE = 14600;

    function byId(id) {
      return state.cities.find((city) => city.id === id);
    }

    function fmt(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function parseNum(value) {
      return Number(String(value || "0").replace(/[^0-9.-]/g, "")) || 0;
    }

    function formatField(input) {
      const parsed = parseNum(input.value);
      input.value = parsed ? fmt(Math.round(parsed)) : "";
      return parsed;
    }

    function federalTax(salary) {
      const taxable = Math.max(0, Number(salary || 0) - STANDARD_DEDUCTION_2024_SINGLE);
      let tax = 0;
      for (let i = 0; i < FEDERAL_BRACKETS_2024_SINGLE.length; i += 1) {
        const current = FEDERAL_BRACKETS_2024_SINGLE[i];
        const next = FEDERAL_BRACKETS_2024_SINGLE[i + 1];
        const nextThreshold = next ? next.threshold : Number.POSITIVE_INFINITY;
        if (taxable > current.threshold) {
          tax += (Math.min(taxable, nextThreshold) - current.threshold) * current.rate;
        }
      }
      return tax;
    }

    function stateTax(salary, rate) {
      return Number(salary || 0) * (Number(rate || 0) / 100);
    }

    function fallbackRemoteResult(source, target) {
      const officeTax = federalTax(state.salary) + stateTax(state.salary, source.stateTaxRate);
      const remoteTax = federalTax(state.remoteSalary) + stateTax(state.remoteSalary, target.stateTaxRate);

      const officeNet = (state.salary - officeTax) / 12 - state.commuteMonthly - state.miscMonthly - source.medianRent1BR;
      const remoteNet = (state.remoteSalary - remoteTax) / 12 - target.medianRent1BR;
      const delta = remoteNet - officeNet;

      return {
        office: {
          monthlyNet: officeNet,
          taxMonthly: officeTax / 12,
          rentMonthly: source.medianRent1BR,
          commuteMonthly: state.commuteMonthly,
          miscMonthly: state.miscMonthly
        },
        remote: {
          monthlyNet: remoteNet,
          taxMonthly: remoteTax / 12,
          rentMonthly: target.medianRent1BR
        },
        monthlyDelta: delta,
        annualDelta: delta * 12,
        verdict: delta >= 0 ? "WORTH IT" : "NOT WORTH IT"
      };
    }

    function fallbackCompareResult(source) {
      return state.targetCityIds
        .map((id) => byId(id))
        .filter(Boolean)
        .slice(0, 3)
        .map((target) => {
          const sourceTax = federalTax(state.salary) + stateTax(state.salary, source.stateTaxRate);
          const sourceNetMonthly = (state.salary - sourceTax) / 12 - source.medianRent1BR;
          const adjustedSalary = Math.round(state.salary * (target.colIndex / source.colIndex));
          const targetTax = federalTax(adjustedSalary) + stateTax(adjustedSalary, target.stateTaxRate);
          const targetNetMonthly = (adjustedSalary - targetTax) / 12 - target.medianRent1BR;
          const netDelta = targetNetMonthly - sourceNetMonthly;

          let verdict = "SIMILAR";
          if (netDelta > 200) verdict = "BETTER";
          if (netDelta < -200) verdict = "WORSE";

          return {
            cityId: target.id,
            cityName: target.name,
            state: target.state,
            adjustedSalary,
            estTakeHomeMonthly: Math.round((adjustedSalary - targetTax) / 12),
            rentDelta: target.medianRent1BR - source.medianRent1BR,
            sourceNetMonthly,
            targetNetMonthly,
            netDelta,
            verdict
          };
        });
    }

    async function apiCalculate(payload) {
      const response = await fetch("/api/calculate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        throw new Error(`API ${response.status}`);
      }
      const json = await response.json();
      return json.result;
    }

    function badgeClass(verdict) {
      if (verdict === "BETTER" || verdict === "WORTH IT") return "badge-better";
      if (verdict === "WORSE" || verdict === "NOT WORTH IT") return "badge-worse";
      return "badge-similar";
    }

    function makeTweet(result, source, target) {
      if (result.monthlyDelta >= 0) {
        const cut = Math.max(0, state.salary - state.remoteSalary);
        return `Taking a $${fmt(cut)} pay cut to work remote from ${target.name} saves me $${fmt(Math.round(result.annualDelta))}/year after taxes and rent. The math hits different. https://yourdomain.com`;
      }
      const breakEven = Math.round(state.remoteSalary + result.monthlyDelta * 12);
      return `Turns out my $${fmt(state.salary)} ${source.name} salary needs to drop below $${fmt(breakEven)} remote before it stops making financial sense. Checked the math. https://yourdomain.com`;
    }

    function updateSticky(text) {
      const sticky = document.getElementById("sticky-summary");
      sticky.textContent = text;
    }

    function renderRemote(result, source, target) {
      const isWorth = result.monthlyDelta >= 0;
      const tweet = makeTweet(result, source, target);
      const fillWidth = Math.min(100, Math.max(8, 50 + (result.monthlyDelta / 2200) * 50));

      updateSticky(`${source.name} office vs ${target.name} remote: ${result.monthlyDelta >= 0 ? "+" : ""}$${fmt(Math.round(result.monthlyDelta))}/mo`);

      document.getElementById("results-panel").innerHTML = `
        <article class="card">
          <div class="result-head">
            <h2>${target.name}, ${target.state}</h2>
            <span class="badge ${badgeClass(result.verdict)}">${result.verdict}</span>
          </div>

          <p style="color: var(--muted); margin-top: 8px;">Net Monthly Difference</p>
          <div class="hero-number" style="color:${isWorth ? "var(--better)" : "var(--worse)"}">
            ${result.monthlyDelta >= 0 ? "+" : ""}$${fmt(Math.round(result.monthlyDelta))}
          </div>

          <div class="bar">
            <div class="bar-fill" style="width:${fillWidth}%; background:${isWorth ? "var(--better)" : "var(--worse)"}"></div>
          </div>

          <div class="rows">
            <div class="row"><span>Office Net (Monthly)</span><strong>$${fmt(Math.round(result.office.monthlyNet))}</strong></div>
            <div class="row"><span>Remote Net (Monthly)</span><strong>$${fmt(Math.round(result.remote.monthlyNet))}</strong></div>
            <div class="row"><span>Office Taxes</span><strong>$${fmt(Math.round(result.office.taxMonthly))}/mo</strong></div>
            <div class="row"><span>Remote Taxes</span><strong>$${fmt(Math.round(result.remote.taxMonthly))}/mo</strong></div>
            <div class="row"><span>Office Commute + Work Costs</span><strong>$${fmt(Math.round(result.office.commuteMonthly + result.office.miscMonthly))}/mo</strong></div>
            <div class="row"><span>Rent Delta</span><strong>${source.medianRent1BR - target.medianRent1BR >= 0 ? "+" : ""}$${fmt(Math.round(source.medianRent1BR - target.medianRent1BR))}/mo</strong></div>
            <div class="row"><span>Annual Delta</span><strong style="color:${isWorth ? "var(--better)" : "var(--worse)"}">${result.annualDelta >= 0 ? "+" : ""}$${fmt(Math.round(result.annualDelta))}</strong></div>
          </div>

          <div class="one-liner">
            Your <strong>$${fmt(state.salary)}</strong> in ${source.name} lives like <strong>$${fmt(Math.round(state.salary + result.monthlyDelta * 12))}</strong> in ${target.name} after rent and tax assumptions.
          </div>

          <div class="tweet">
            <p>"${tweet}"</p>
            <button class="copy-btn" id="copy-tweet">Copy Tweet</button>
          </div>
        </article>
      `;

      document.getElementById("copy-tweet").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(tweet);
          window.alert("Tweet copied to clipboard.");
        } catch (_error) {
          window.alert("Clipboard blocked. Copy manually from card text.");
        }
      });
    }

    function renderCompare(cards, source) {
      updateSticky(`Comparing ${source.name} vs ${cards.length} target cities`);

      if (!cards.length) {
        document.getElementById("results-panel").innerHTML = "<article class=\"card\"><p style=\"color:var(--muted)\">Add up to 3 target cities to compare.</p></article>";
        return;
      }

      const pieces = ["<div class=\"result-grid\">"];
      cards.forEach((card, index) => {
        const borderColor = card.verdict === "BETTER" ? "var(--better)" : card.verdict === "WORSE" ? "var(--worse)" : "var(--similar)";

        pieces.push(`
          <article class="card" style="border-top:4px solid ${borderColor}">
            <div class="result-head">
              <h3>${card.cityName}, ${card.state}</h3>
              <span class="badge ${badgeClass(card.verdict)}">${card.verdict}</span>
            </div>
            <p style="color: var(--muted); margin-top: 6px;">Adjusted Equivalent Salary</p>
            <div class="hero-number" style="font-size:2.1rem">$${fmt(card.adjustedSalary)}</div>
            <div class="rows">
              <div class="row"><span>Est. Take-Home</span><strong>$${fmt(Math.round(card.estTakeHomeMonthly))}/mo</strong></div>
              <div class="row"><span>Monthly Housing Delta</span><strong>${card.rentDelta > 0 ? "+" : ""}$${fmt(Math.round(card.rentDelta))}</strong></div>
              <div class="row"><span>Net Delta vs ${source.name}</span><strong style="color:${card.netDelta >= 0 ? "var(--better)" : "var(--worse)"}">${card.netDelta >= 0 ? "+" : ""}$${fmt(Math.round(card.netDelta))}/mo</strong></div>
            </div>
            <div class="one-liner">Your $${fmt(Math.round(state.salary / 1000))}k in ${source.name} lives like <strong>$${fmt(Math.round(card.adjustedSalary / 1000))}k</strong> here.</div>
          </article>
        `);

        if (index === 1 || (index === 0 && cards.length === 1)) {
          pieces.push("<div id=\"ad-results\" class=\"ad-slot\" data-size=\"300x250\">ADVERTISEMENT (300x250)</div>");
        }
      });
      pieces.push("</div>");

      document.getElementById("results-panel").innerHTML = pieces.join("");
    }

    function syncInputs() {
      document.getElementById("input-salary").value = fmt(state.salary);
      document.getElementById("input-remote-salary").value = fmt(state.remoteSalary);
      document.getElementById("input-commute").value = fmt(state.commuteMonthly);
      document.getElementById("input-misc").value = fmt(state.miscMonthly);

      const source = byId(state.sourceCityId);
      const target = byId(state.targetCityId);

      document.getElementById("search-source").value = source ? `${source.name}, ${source.state}` : "";
      document.getElementById("search-target").value = state.mode === "remote" && target ? `${target.name}, ${target.state}` : "";

      const modeRemote = state.mode === "remote";
      document.getElementById("tab-remote").classList.toggle("active", modeRemote);
      document.getElementById("tab-col").classList.toggle("active", !modeRemote);
      document.getElementById("mode-title").textContent = modeRemote ? "Remote ROI" : "Compare Cities";
      document.getElementById("salary-label").textContent = modeRemote ? "Current Salary (Office)" : "Base Salary";
      document.getElementById("target-label").textContent = modeRemote ? "Target City (to move to)" : "Compare Against";
      document.getElementById("remote-salary-group").classList.toggle("hidden", !modeRemote);
      document.getElementById("expense-group").classList.toggle("hidden", !modeRemote);
      document.getElementById("target-list").classList.toggle("hidden", modeRemote);

      renderSelectedTargets();
    }

    function updateUrl() {
      const params = new URLSearchParams();
      params.set("mode", state.mode);
      params.set("salary", Math.round(state.salary));
      params.set("from", state.sourceCityId);
      params.set("commute", Math.round(state.commuteMonthly));
      params.set("misc", Math.round(state.miscMonthly));

      if (state.mode === "remote") {
        params.set("rcity", state.targetCityId);
        params.set("rsalary", Math.round(state.remoteSalary));
      } else {
        params.set("to", state.targetCityIds.join(","));
      }

      window.history.replaceState({}, "", `?${params.toString()}`);
    }

    function parseUrl() {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode");
      if (mode === "remote" || mode === "col") state.mode = mode;

      state.salary = parseNum(params.get("salary")) || state.salary;
      state.remoteSalary = parseNum(params.get("rsalary")) || state.remoteSalary;
      state.commuteMonthly = parseNum(params.get("commute")) || state.commuteMonthly;
      state.miscMonthly = parseNum(params.get("misc")) || state.miscMonthly;

      const source = params.get("from");
      const target = params.get("rcity");
      if (source && byId(source)) state.sourceCityId = source;
      if (target && byId(target)) state.targetCityId = target;

      const targets = params.get("to");
      if (targets) {
        const ids = targets.split(",").filter((id) => byId(id));
        if (ids.length) state.targetCityIds = ids.slice(0, 3);
      }
    }

    function renderSelectedTargets() {
      const targetList = document.getElementById("target-list");
      if (state.mode !== "col") {
        targetList.innerHTML = "";
        return;
      }

      targetList.innerHTML = state.targetCityIds
        .map((id) => byId(id))
        .filter(Boolean)
        .map((city) => `<div class="selected-item">${city.name}, ${city.state}<span class="remove-item" data-id="${city.id}">&times;</span></div>`)
        .join("");

      targetList.querySelectorAll(".remove-item").forEach((button) => {
        button.addEventListener("click", () => {
          state.targetCityIds = state.targetCityIds.filter((id) => id !== button.dataset.id);
          updateUrl();
          render();
        });
      });
    }

    function setupCitySearch(type) {
      const input = document.getElementById(`search-${type}`);
      const dropdown = document.getElementById(`dropdown-${type}`);

      const draw = (query) => {
        const q = String(query || "").toLowerCase();
        const filtered = state.cities.filter((city) => `${city.name}, ${city.state}`.toLowerCase().includes(q));
        dropdown.innerHTML = filtered
          .slice(0, 50)
          .map((city) => `<div class="dropdown-item" data-city-id="${city.id}">${city.name}, ${city.state}</div>`)
          .join("");
        dropdown.classList.add("show");

        dropdown.querySelectorAll(".dropdown-item").forEach((item) => {
          item.addEventListener("click", () => {
            const cityId = item.dataset.cityId;
            if (type === "source") {
              state.sourceCityId = cityId;
              const source = byId(cityId);
              state.commuteMonthly = source ? source.avgCommuteCostMonthly : state.commuteMonthly;
            } else if (state.mode === "remote") {
              state.targetCityId = cityId;
            } else if (!state.targetCityIds.includes(cityId) && state.targetCityIds.length < 3) {
              state.targetCityIds.push(cityId);
            }
            input.value = type === "target" && state.mode === "col" ? "" : item.textContent;
            dropdown.classList.remove("show");
            updateUrl();
            render();
          });
        });
      };

      input.addEventListener("focus", () => draw(input.value));
      input.addEventListener("input", () => draw(input.value));
    }

    async function render() {
      syncInputs();

      const source = byId(state.sourceCityId);
      const target = byId(state.targetCityId);
      if (!source || !target) return;

      updateUrl();

      if (state.mode === "remote") {
        let result;
        try {
          result = await apiCalculate({
            mode: "remote",
            salary: state.salary,
            remoteSalary: state.remoteSalary,
            sourceCityId: source.id,
            targetCityId: target.id,
            commuteMonthly: state.commuteMonthly,
            miscMonthly: state.miscMonthly
          });
        } catch (_error) {
          result = fallbackRemoteResult(source, target);
        }
        renderRemote(result, source, target);
      } else {
        let cards;
        try {
          const result = await apiCalculate({
            mode: "col",
            salary: state.salary,
            sourceCityId: source.id,
            targetCityIds: state.targetCityIds
          });
          cards = result.cards || [];
        } catch (_error) {
          cards = fallbackCompareResult(source);
        }
        renderCompare(cards, source);
      }
    }

    async function init() {
      const response = await fetch("./data/cities.json", { cache: "no-store" });
      state.cities = await response.json();
      if (!state.cities.find((city) => city.id === state.sourceCityId)) {
        state.sourceCityId = state.cities[0].id;
      }
      if (!state.cities.find((city) => city.id === state.targetCityId)) {
        state.targetCityId = state.cities[1].id;
      }

      parseUrl();

      setupCitySearch("source");
      setupCitySearch("target");

      document.getElementById("tab-remote").addEventListener("click", () => {
        state.mode = "remote";
        render();
      });

      document.getElementById("tab-col").addEventListener("click", () => {
        state.mode = "col";
        render();
      });

      document.getElementById("input-salary").addEventListener("input", (event) => {
        state.salary = formatField(event.target);
        render();
      });
      document.getElementById("input-remote-salary").addEventListener("input", (event) => {
        state.remoteSalary = formatField(event.target);
        render();
      });
      document.getElementById("input-commute").addEventListener("input", (event) => {
        state.commuteMonthly = formatField(event.target);
        render();
      });
      document.getElementById("input-misc").addEventListener("input", (event) => {
        state.miscMonthly = formatField(event.target);
        render();
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".city-picker")) {
          document.querySelectorAll(".dropdown").forEach((dropdown) => dropdown.classList.remove("show"));
        }
      });

      render();
    }

    init().catch((error) => {
      document.getElementById("results-panel").innerHTML = `<article class="card"><p style="color: var(--worse)">Failed to initialize app: ${error.message}</p></article>`;
    });
  </script>
</body>
</html>
